
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тест про географію</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-container">

    <div id="start-screen" class="screen">
        <h1 class="start-screen__title">Тест про географію</h1>
        <h2 class="start-screen__description">
            Покажи наскільки ти знаєш географію 😶‍🌫️
        </h2>
        <button id="start-btn">Розпочати</button>
    </div>

    <div id="quiz-screen" class="screen hide">
        <div class="header">
            <span id="timer">Час: 15</span>
            <span id="score-display">Бали: 0</span>
        </div>

        <h2 id="question-text">Запитання</h2>

        <!-- ВИПРАВЛЕНО ТУТ -->
        <div id="answers-container"></div>
    </div>

    <div id="result-screen" class="screen hide">
        <h2>Тест завершено! 🥳😊</h2>
        <p id="result-text"></p>
        <button id="restart-btn">Спробувати ще</button>
    </div>

</div>

<!-- ПІДКЛЮЧЕННЯ JS -->
<script src="script.js"></script>

</body>
</html>
